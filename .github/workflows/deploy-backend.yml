name: Deploy Backend to Azure Function

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pushd './backend'
        python -m pip install --upgrade pip
        pip install -r requirements.txt --target="./.python_packages/lib/site-packages"
        popd

    - name: Prepare deployment package
      run: |
        mkdir -p ./backend/deployment_package
        cp -r ./backend/.python_packages ./backend/deployment_package/
        cp ./backend/*.py ./backend/deployment_package/ 2>/dev/null || true
        cp ./backend/function.json ./backend/deployment_package/ 2>/dev/null || true
        cp ./backend/host.json ./backend/deployment_package/ 2>/dev/null || true
        cp ./backend/requirements.txt ./backend/deployment_package/ 2>/dev/null || true

    - name: Deploy to Azure Function
      uses: azure/functions-action@v1
      with:
        app-name: 'buildautomation3'
        package: './backend/deployment_package'
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        scm-do-build-during-deployment: false
        enable-oryx-build: false