name: Deploy Backend to Azure Function

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt --target=".python_packages/lib/site-packages"

    - name: Zip Artifacts
      run: |
        cd backend
        zip -r ../release.zip .

    - name: Deploy to Azure Function via Zip Deploy
      uses: azure/functions-action@v1
      with:
        app-name: 'buildautomation3'
        package: './release.zip'
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}